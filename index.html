<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="4dfe84bf52756542" />
    
    <title>Urus Taxi - Toshkent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; }
        #map { height: 400px; border-radius: 25px; z-index: 1; filter: invert(0.9) hue-rotate(180deg); }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .yellow-btn { background: #facc15; color: black; font-weight: 900; transition: 0.3s; cursor: pointer; }
        input, select { width: 100%; padding: 14px; background: #111; border-radius: 12px; border: 1px solid #222; outline: none; color: white; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-5xl w-full grid md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-[2.5rem] space-y-4">
            <h1 class="text-3xl font-black italic text-yellow-500 mb-4">URUS TAXI</h1>
            
            <input type="text" id="name" placeholder="Ismingiz">
            <input type="text" id="from" placeholder="📍 A nuqta (Qayerdan)">
            <input type="text" id="to" placeholder="🏁 B nuqta (Qayerga)">
            <input type="tel" id="phone" value="+998">
            
            <select id="tarif">
                <option value="Ekonom">🚕 Ekonom</option>
                <option value="Komfort">✨ Komfort</option>
                <option value="Biznes">🤵 Biznes</option>
            </select>

            <button onclick="sendToTelegram()" id="btn" class="w-full py-4 yellow-btn rounded-xl uppercase">
                Buyurtma Berish
            </button>
        </div>

        <div class="relative">
            <div id="map" class="border border-white/5 shadow-2xl"></div>
            <p class="text-[10px] text-gray-500 mt-2 text-center">🟡 A nuqta | 🔴 B nuqta</p>
        </div>
    </div>

    <script>
        var map = L.map('map').setView([41.3111, 69.2797], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var markerA = L.marker([41.3111, 69.2797], {draggable: true, icon: L.divIcon({html: '🟡', className: 'text-2xl'})}).addTo(map);
        var markerB = L.marker([41.3150, 69.2850], {draggable: true, icon: L.divIcon({html: '🔴', className: 'text-2xl'})}).addTo(map);

        markerA.on('dragend', () => { document.getElementById('from').value = markerA.getLatLng().lat.toFixed(5) + "," + markerA.getLatLng().lng.toFixed(5); });
        markerB.on('dragend', () => { document.getElementById('to').value = markerB.getLatLng().lat.toFixed(5) + "," + markerB.getLatLng().lng.toFixed(5); });

        async function sendToTelegram() {
            const token = "8645728789:AAGLlVoEmNy9YtuuzPiPQiFanFD1Z9uMgl4";
            const chat_id = "8514630685";
            
            const name = document.getElementById('name').value;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const phone = document.getElementById('phone').value;
            const tarif = document.getElementById('tarif').value;
            const btn = document.getElementById('btn');

            if(!name || !from || !to) { alert("To'ldiring!"); return; }

            btn.innerText = "YUBORILMOQDA...";
            const text = `🚕 URUS TAXI\n👤 Mijoz: ${name}\n📞 Tel: ${phone}\n✨ Tarif: ${tarif}\n📍 A: ${from}\n🏁 B: ${to}`;

            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id, text, parse_mode: "Markdown" })
                });
                alert("Buyurtma yuborildi! ✅");
                btn.innerText = "YUBORILDI";
            } catch (err) { alert("Xato!"); btn.innerText = "XATO"; }
        }
    </script>
</body>
</html>
