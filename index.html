<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urus Taxi - Live System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; }
        #map { height: 350px; border-radius: 25px; z-index: 1; filter: invert(0.9) hue-rotate(180deg); }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .yellow-btn { background: #facc15; color: black; font-weight: 900; transition: 0.3s; cursor: pointer; }
        .yellow-btn:hover { background: #eab308; transform: scale(1.02); }
        input, select { width: 100%; padding: 14px; background: #111; border-radius: 12px; border: 1px solid #222; outline: none; color: white; font-size: 14px; }
        input:focus { border-color: #facc15; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-4xl w-full grid md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-[2rem] space-y-4">
            <h1 class="text-3xl font-black italic text-yellow-500 mb-4">URUS TAXI</h1>
            
            <input type="text" id="name" placeholder="Ismingiz">
            <input type="text" id="from" placeholder="📍 Qayerdan (Xaritadan tanlang)">
            <input type="text" id="to" placeholder="🏁 Qayerga borasiz?">
            <input type="tel" id="phone" value="+998">
            
            <select id="tarif">
                <option value="Ekonom">🚕 Ekonom - 4 000 so'm</option>
                <option value="Komfort">✨ Komfort - 7 000 so'm</option>
                <option value="Biznes">🤵 Biznes - 15 000 so'm</option>
            </select>

            <button onclick="sendToTelegram()" id="btn" class="w-full py-4 yellow-btn rounded-xl uppercase">
                Taksi Chaqirish
            </button>
            <p id="status" class="text-center text-xs font-bold mt-2"></p>
        </div>

        <div class="relative">
            <div id="map" class="border border-white/5"></div>
            <p class="text-[10px] text-gray-500 mt-2 text-center">Xaritadagi sarg'ish nuqtani kerakli joyga suring</p>
        </div>
    </div>

    <script>
        // Xarita sozlash
        var map = L.map('map').setView([41.3111, 69.2797], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([41.3111, 69.2797], {draggable: true}).addTo(map);

        marker.on('dragend', function() {
            var pos = marker.getLatLng();
            document.getElementById('from').value = pos.lat.toFixed(5) + ", " + pos.lng.toFixed(5);
        });

        // ASOSIY FUNKSIYA
        async function sendToTelegram() {
            const token = "8645728789:AAGLlVoEmNy9YtuuzPiPQiFanFD1Z9uMgl4";
            const chat_id = "8514630685"; // SIZNING YANGI ID RAQAMINGIZ
            
            const name = document.getElementById('name').value;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const phone = document.getElementById('phone').value;
            const tarif = document.getElementById('tarif').value;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');

            if(!name || !from || !to) {
                alert("Iltimos, hamma kataklarni to'ldiring!");
                return;
            }

            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            const text = `🚕 **YANGI BUYURTMA!**\n\n` +
                         `👤 Mijoz: ${name}\n` +
                         `📞 Tel: ${phone}\n` +
                         `📍 Qayerdan: ${from}\n` +
                         `🏁 Qayerga: ${to}\n` +
                         `✨ Tarif: ${tarif}\n\n` +
                         `🛰 Lokatsiya: https://www.google.com/maps?q=${from.replace(" ", "")}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chat_id,
                        text: text,
                        parse_mode: "Markdown"
                    })
                });

                const result = await response.json();

                if(result.ok) {
                    status.innerText = "Muvaffaqiyatli! ✅ Xabar Telegramga bordi.";
                    status.style.color = "#facc15";
                    btn.innerText = "YUBORILDI";
                } else {
                    status.innerText = "Xato: " + result.description;
                    status.style.color = "red";
                    btn.disabled = false;
                    btn.innerText = "QAYTA URINISH";
                }
            } catch (err) {
                status.innerText = "Internet xatosi! ❌";
                btn.disabled = false;
                btn.innerText = "QAYTA URINISH";
            }
        }

        // Avto-GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                map.setView([lat, lng], 15);
                marker.setLatLng([lat, lng]);
                document.getElementById('from').value = lat.toFixed(5) + ", " + lng.toFixed(5);
            });
        }
    </script>
</body>
                </html>
