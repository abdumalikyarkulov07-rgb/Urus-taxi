<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urus Taxi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .yellow-gradient { background: linear-gradient(135deg, #facc15, #eab308); }
        body { background-color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border-t-8 border-yellow-400">
        
        <div class="p-8 text-center bg-gray-900 text-white">
            <h1 class="text-3xl font-black italic tracking-tighter">URUS <span class="text-yellow-400">TAXI</span></h1>
            <p class="text-xs text-gray-400 mt-2 uppercase tracking-widest">Tezkor • Arzon • Qulay</p>
        </div>

        <div class="p-8 space-y-5">
            <div>
                <label class="text-xs font-bold text-gray-500 ml-2">QAYERDAN?</label>
                <input type="text" id="from" placeholder="Hozirgi manzilingiz" 
                       class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none focus:border-yellow-500 transition">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 ml-2">QAYERGA?</label>
                <input type="text" id="to" placeholder="Borish manzilingiz" 
                       class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none focus:border-yellow-500 transition">
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 ml-2">TEL RAQAM</label>
                <input type="tel" id="tel" value="+998" 
                       class="w-full mt-1 p-4 bg-gray-50 rounded-2xl border border-gray-200 outline-none focus:border-yellow-500 transition font-mono">
            </div>

            <button onclick="orderTaxi()" id="mainBtn" 
                    class="w-full py-5 yellow-gradient text-black font-black rounded-2xl text-lg shadow-lg hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-wider">
                Mashina chaqirish
            </button>

            <div id="statusBox" class="hidden p-4 rounded-xl text-center text-sm font-bold animate-bounce"></div>
        </div>
    </div>

    <script>
        function orderTaxi() {
            // Ma'lumotlarni olish
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const tel = document.getElementById('tel').value;
            const btn = document.getElementById('mainBtn');
            const status = document.getElementById('statusBox');

            // Tekshirish
            if(from === "" || to === "" || tel === "+998") {
                status.classList.remove('hidden', 'bg-green-100', 'text-green-700');
                status.classList.add('bg-red-100', 'text-red-700');
                status.innerText = "Iltimos, hamma joyni to'ldiring! ⚠️";
                return;
            }

            // Animatsiya boshlash
            btn.innerText = "Mashina qidirilmoqda...";
            btn.disabled = true;
            btn.style.opacity = "0.7";

            // 2 soniyadan keyin javob qaytarish
            setTimeout(() => {
                status.classList.remove('hidden', 'bg-red-100', 'text-red-700');
                status.classList.add('bg-green-100', 'text-green-700');
                status.innerText = "Muvaffaqiyatli! Haydovchi yo'lga chiqdi. ✅";
                
                btn.innerText = "MASHINA TOPILDI!";
                btn.classList.replace('yellow-gradient', 'bg-green-500');
                btn.style.color = "white";

                alert("URUS TAXI: Buyurtma qabul qilindi!\n\nManzil: " + from + " -> " + to + "\nTez orada haydovchi qo'ng'iroq qiladi.");
            }, 2000);
        }
    </script>

</body>
  </html>
