<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urus Taxi - Advanced Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background: #050505; color: white; }
        #map { height: 450px; border-radius: 30px; z-index: 1; filter: invert(0.9) hue-rotate(180deg); }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .yellow-btn { background: #facc15; color: black; font-weight: 900; transition: 0.3s; cursor: pointer; }
        input, select { width: 100%; padding: 15px; background: #111; border-radius: 15px; border: 1px solid #222; outline: none; color: white; }
        input:focus { border-color: #facc15; }
        .label-tag { font-size: 10px; font-weight: bold; color: #666; margin-left: 10px; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-6xl w-full grid md:grid-cols-12 gap-6">
        <div class="md:col-span-5 glass p-8 rounded-[2.5rem] space-y-4 shadow-2xl">
            <h1 class="text-4xl font-black italic text-yellow-500 mb-6 tracking-tighter">URUS TAXI</h1>
            
            <div>
                <span class="label-tag">Ismingiz</span>
                <input type="text" id="name" placeholder="Masalan: Azizbek">
            </div>

            <div>
                <span class="label-tag">A nuqta (Qayerdan)</span>
                <input type="text" id="from" placeholder="📍 Manzilni yozing yoki xaritani suring">
            </div>

            <div>
                <span class="label-tag">B nuqta (Qayerga)</span>
                <input type="text" id="to" placeholder="🏁 Boradigan manzilingizni yozing">
            </div>

            <div>
                <span class="label-tag">Telefon</span>
                <input type="tel" id="phone" value="+998">
            </div>
            
            <select id="tarif">
                <option value="Ekonom">🚕 Ekonom - 4 000 so'm</option>
                <option value="Komfort">✨ Komfort - 7 000 so'm</option>
                <option value="Biznes">🤵 Biznes - 15 000 so'm</option>
            </select>

            <button onclick="sendToTelegram()" id="btn" class="w-full py-5 yellow-btn rounded-2xl uppercase shadow-xl shadow-yellow-500/10">
                Buyurtma Berish
            </button>
            <p id="status" class="text-center text-xs font-bold mt-2"></p>
        </div>

        <div class="md:col-span-7 relative">
            <div id="map" class="border border-white/5 shadow-2xl"></div>
            <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
                <div class="bg-black/80 p-2 rounded-lg text-[10px] border border-yellow-500/50">🟡 Sarg'ish marker: Kelish joyi</div>
                <div class="bg-black/80 p-2 rounded-lg text-[10px] border border-red-500/50">🔴 Qizil marker: Borish joyi</div>
            </div>
        </div>
    </div>

    <script>
        // Xarita va markerlar
        var map = L.map('map').setView([41.3111, 69.2797], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // A marker (Sarg'ish)
        var markerA = L.marker([41.3111, 69.2797], {
            draggable: true,
            icon: L.divIcon({ html: '🟡', className: 'text-2xl', iconSize: [24, 24] })
        }).addTo(map);

        // B marker (Qizil)
        var markerB = L.marker([41.3150, 69.2850], {
            draggable: true,
            icon: L.divIcon({ html: '🔴', className: 'text-2xl', iconSize: [24, 24] })
        }).addTo(map);

        // Marker surilganda inputlarni yangilash
        markerA.on('dragend', function() {
            updateInput('from', markerA.getLatLng());
        });

        markerB.on('dragend', function() {
            updateInput('to', markerB.getLatLng());
        });

        function updateInput(id, pos) {
            document.getElementById(id).value = pos.lat.toFixed(5) + ", " + pos.lng.toFixed(5);
        }

        // Inputga koordinata yozilsa markerni ko'chirish (Advanced)
        document.getElementById('from').addEventListener('change', function(e) {
            let val = e.target.value.split(',');
            if(val.length === 2) markerA.setLatLng([val[0], val[1]]);
        });

        document.getElementById('to').addEventListener('change', function(e) {
            let val = e.target.value.split(',');
            if(val.length === 2) markerB.setLatLng([val[0], val[1]]);
        });

        // TELEGRAMGA YUBORISH
        async function sendToTelegram() {
            const token = "8645728789:AAGLlVoEmNy9YtuuzPiPQiFanFD1Z9uMgl4";
            const chat_id = "8514630685";
            
            const name = document.getElementById('name').value;
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const phone = document.getElementById('phone').value;
            const tarif = document.getElementById('tarif').value;
            const btn = document.getElementById('btn');

            if(!name || !from || !to) { alert("Iltimos, barcha maydonlarni to'ldiring!"); return; }

            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            const text = `🚕 **URUS TAXI - YANGI BUYURTMA!**\n\n` +
                         `👤 Mijoz: ${name}\n` +
                         `📞 Tel: ${phone}\n` +
                         `✨ Tarif: ${tarif}\n\n` +
                         `📍 QAYERDAN: ${from}\n` +
                         `🏁 QAYERGA: ${to}\n\n` +
                         `🔗 Yo'nalish: https://www.google.com/maps/dir/${from}/${to}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id, text, parse_mode: "Markdown" })
                });
                if(response.ok) {
                    alert("Buyurtma yuborildi! ✅");
                    btn.innerText = "YUBORILDI";
                }
            } catch (err) {
                alert("Xatolik!");
                btn.disabled = false;
                btn.innerText = "QAYTA URINISH";
            }
        }

        // GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                map.setView([lat, lng], 15);
                markerA.setLatLng([lat, lng]);
                updateInput('from', markerA.getLatLng());
            });
        }
    </script>
</body>
</html>
