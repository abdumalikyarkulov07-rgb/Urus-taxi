<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="4dfe84bf52756542" />
    <title>Urus Taxi</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px; }
        .card { background: #111; padding: 20px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #map { height: 280px; width: 100%; border-radius: 20px; margin-top: 15px; border: 1px solid #222; }
        input, select { width: 100%; padding: 14px; margin-bottom: 12px; background: #222; border: 1px solid #333; border-radius: 12px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: #facc15; }
        .btn { width: 100%; padding: 16px; background: #facc15; color: black; font-weight: 900; border-radius: 15px; border: none; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        .btn:active { transform: scale(0.98); }
        .car-display { background: #facc15; color: black; padding: 12px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nomer { background: #000; color: #fff; padding: 2px 8px; border-radius: 5px; font-family: monospace; font-weight: bold; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="text-2xl font-black italic text-yellow-500 text-center mb-4">URUS TAXI</h1>
        
        <div class="car-display">
            <div>
                <p class="text-[10px] uppercase font-bold opacity-70">Mashina:</p>
                <span id="carName" class="font-black italic">Nexia 3 (Oq)</span>
            </div>
            <span id="carNum" class="nomer text-sm">01 X 123 BA</span>
        </div>

        <input type="text" id="name" placeholder="👤 Ismingiz">
        <input type="text" id="from" placeholder="📍 Qayerdan? (GPS...) ">
        <input type="text" id="to" placeholder="🏁 Qayerga borasiz?">
        <input type="tel" id="phone" value="+998">
        
        <select id="tarif" onchange="updateCar()">
            <option value="Ekonom">🚕 Ekonom (Nexia 3)</option>
            <option value="Komfort">✨ Komfort (Gentra)</option>
            <option value="Biznes">🤵 Biznes (Malibu / Urus)</option>
        </select>

        <button class="btn" onclick="sendOrder()" id="orderBtn">Buyurtma berish</button>
    </div>

    <div id="map"></div>

    <script>
        // Telegram sozlamasi
        const tg = window.Telegram.WebApp;
        tg.expand();

        const taxiData = {
            "Ekonom": { name: "Nexia 3 (Oq)", plate: "01 X 123 BA" },
            "Komfort": { name: "Gentra (Qora)", plate: "01 Z 777 ZZ" },
            "Biznes": { name: "Malibu 2 (Jigarrang)", plate: "01 U 001 RR" }
        };

        function updateCar() {
            const tarif = document.getElementById('tarif').value;
            document.getElementById('carName').innerText = taxiData[tarif].name;
            document.getElementById('carNum').innerText = taxiData[tarif].plate;
        }

        // Xaritani yaratish
        var map = L.map('map').setView([41.3111, 69.2797], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // A marker (Sariq nuqta)
        var marker = L.marker([41.3111, 69.2797], {draggable: true}).addTo(map);

        marker.on('dragend', function() {
            var pos = marker.getLatLng();
            document.getElementById('from').value = pos.lat.toFixed(5) + "," + pos.lng.toFixed(5);
        });

        // GPS orqali joyni aniqlash
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    map.setView([lat, lng], 17);
                    marker.setLatLng([lat, lng]);
                    document.getElementById('from').value = lat.toFixed(5) + "," + lng.toFixed(5);
                }, (err) => {
                    console.log("GPS xatosi");
                }, {enableHighAccuracy: true});
            }
        }
        window.onload = initGPS;

            const uCar = taxiData[uTarif];

            if(!uName || !uFrom || !uTo) {
                tg.showAlert("Iltimos, barcha maydonlarni to'ldiring!");
                return;
            }

            const lat = marker.getLatLng().lat;

            // SIZ SO'RAGAN ANIQ FORMAT
            const message = `🚕 **YANGI BUYURTMA!**\n\n` +
                            `👤 Mijoz: ${uName}\n` +
                            `📞 Tel: ${uPhone}\n` +

                            `🛰 Lokatsiya: https://www.google.com/maps?q=${lat},${lng}`;
