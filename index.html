<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urus Taxi - Live Dispatcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        #map { height: 400px; border-radius: 30px; z-index: 1; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .yellow-btn { background: #facc15; color: black; font-weight: 900; transition: 0.3s; }
        .yellow-btn:hover { background: #eab308; transform: scale(1.02); }
        .input-style { width: 100%; padding: 16px; background: #111; border-radius: 16px; border: 1px solid #222; outline: none; font-size: 14px; }
        .input-style:focus { border-color: #facc15; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center">

    <div class="max-w-4xl w-full space-y-6">
        <div class="glass p-8 rounded-[2.5rem] shadow-2xl text-center">
            <h1 class="text-4xl font-black italic text-yellow-500 tracking-tighter">URUS TAXI</h1>
            <p class="text-gray-400 text-xs mt-2 uppercase">Buyurtma berish tizimi</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-[2.5rem] space-y-4">
                <input type="text" id="custName" placeholder="Ismingiz" class="input-style">
                <input type="text" id="fromLoc" placeholder="📍 Qayerdan? (Yoki xaritadan tanlang)" class="input-style">
                <input type="text" id="toLoc" placeholder="🏁 Qayerga?" class="input-style">
                <input type="tel" id="custPhone" value="+998" class="input-style font-bold">
                
                <select id="tarifType" class="input-style appearance-none text-yellow-500 font-bold">
                    <option value="Ekonom">🚕 Ekonom - 4 000 so'm</option>
                    <option value="Komfort">✨ Komfort - 7 000 so'm</option>
                    <option value="Biznes">🤵 Biznes - 15 000 so'm</option>
                </select>

                <button onclick="sendOrder()" id="orderBtn" class="w-full py-5 yellow-btn rounded-2xl text-lg uppercase shadow-lg shadow-yellow-500/10">
                    Buyurtma Berish
                </button>
                <p id="statusMsg" class="text-center text-xs font-bold"></p>
            </div>

            <div class="relative">
                <div id="map" class="border border-white/5 shadow-2xl"></div>
                <p class="absolute bottom-4 left-4 z-[1000] bg-black/80 p-2 rounded-lg text-[10px] text-gray-400">
                    Xaritadagi belgini suring yoki bosing
                </p>
            </div>
        </div>
    </div>

    <script>
        // Xarita sozlamalari
        var map = L.map('map').setView([41.3111, 69.2797], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([41.3111, 69.2797], {draggable: true}).addTo(map);

        marker.on('dragend', function() {
            var pos = marker.getLatLng();
            document.getElementById('fromLoc').value = pos.lat.toFixed(5) + ", " + pos.lng.toFixed(5);
        });

        async function sendOrder() {
            const botToken = "8645728789:AAGLlVoEmNy9YtuuzPiPQiFanFD1Z9uMgl4";
            const chatId = "6616091090"; // O'zingizning Chat ID raqamingizni shu yerga yozing!
            
            const name = document.getElementById('custName').value;
            const from = document.getElementById('fromLoc').value;
            const to = document.getElementById('toLoc').value;
            const phone = document.getElementById('custPhone').value;
            const tarif = document.getElementById('tarifType').value;
            const btn = document.getElementById('orderBtn');
            const status = document.getElementById('statusMsg');

            if(!name || !from || !to || phone === "+998") {
                alert("Iltimos, barcha ma'lumotlarni to'ldiring!");
                return;
            }

            btn.innerText = "YUBORILMOQDA...";
            btn.disabled = true;

            // Xabar matni
            const message = `🚕 **URUS TAXI - YANGI BUYURTMA!**\n\n` +
                            `👤 Mijoz: ${name}\n` +
                            `📞 Tel: ${phone}\n` +
                            `📍 Qayerdan: ${from}\n` +
                            `🏁 Qayerga: ${to}\n` +
                            `✨ Tarif: ${tarif}\n\n` +
                            `🔗 Xarita: https://www.google.com/maps?q=${from.replace(" ", "")}`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: "Markdown"
                    })
                });

                if(response.ok) {
                    status.innerText = "BUYURTMA BOTGA YUBORILDI! ✅";
                    status.style.color = "#22c55e";
                    btn.innerText = "QABUL QILINDI";
                    alert("Sizning buyurtmangiz Urus Taxi operatorlariga yuborildi!");
                } else {
                    throw new Error();
                }
            } catch (error) {
                status.innerText = "Xatolik yuz berdi! ❌";
                status.style.color = "#ef4444";
                btn.innerText = "QAYTA URINISH";
                btn.disabled = false;
                console.log(error);
            }
        }

        // Avto GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                map.setView([lat, lng], 15);
                marker.setLatLng([lat, lng]);
                document.getElementById('fromLoc').value = lat.toFixed(5) + ", " + lng.toFixed(5);
            });
        }
    </script>
</body>
</html>
