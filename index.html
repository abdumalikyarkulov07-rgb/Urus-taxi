<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urus Taxi - Buyurtma holati</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 450px; border-radius: 30px; z-index: 1; }
        .yellow-gradient { background: linear-gradient(135deg, #facc15, #eab308); }
        body { background-color: #0b0f1a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .tarif-card.active { border-color: #facc15; background: rgba(250, 204, 21, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid md:grid-cols-2 gap-6">
        
        <div class="space-y-6">
            <div class="glass p-6 rounded-[2rem]">
                <h1 class="text-3xl font-black italic text-yellow-500 mb-6 tracking-tighter">URUS <span class="text-white">TAXI</span></h1>
                
                <div class="space-y-3 mb-6">
                    <input type="text" id="from" placeholder="📍 Qayerdan?" class="w-full p-4 bg-slate-800 rounded-2xl outline-none focus:ring-2 ring-yellow-500 border-none text-sm">
                    <input type="text" id="to" placeholder="🏁 Qayerga?" class="w-full p-4 bg-slate-800 rounded-2xl outline-none focus:ring-2 ring-yellow-500 border-none text-sm">
                </div>

                <h3 class="text-sm font-bold text-gray-400 mb-3 ml-1 uppercase">Tarifni tanlang:</h3>
                <div class="grid grid-cols-3 gap-3 mb-6">
                    <div onclick="selectTarif(this, 'Ekonom', 4000)" class="tarif-card active p-3 border-2 border-transparent rounded-2xl cursor-pointer text-center transition bg-slate-800">
                        <div class="text-xl">🚕</div>
                        <div class="font-bold text-xs">Ekonom</div>
                        <div class="text-[10px] text-yellow-500">4 000 sum</div>
                    </div>
                    <div onclick="selectTarif(this, 'Komfort', 7000)" class="tarif-card p-3 border-2 border-transparent rounded-2xl cursor-pointer text-center transition bg-slate-800">
                        <div class="text-xl">✨</div>
                        <div class="font-bold text-xs">Komfort</div>
                        <div class="text-[10px] text-yellow-500">7 000 sum</div>
                    </div>
                    <div onclick="selectTarif(this, 'Biznes', 15000)" class="tarif-card p-3 border-2 border-transparent rounded-2xl cursor-pointer text-center transition bg-slate-800">
                        <div class="text-xl">🤵</div>
                        <div class="font-bold text-xs">Biznes</div>
                        <div class="text-[10px] text-yellow-500">15 000 sum</div>
                    </div>
                </div>

                <button onclick="startOrder()" id="mainBtn" class="w-full py-5 yellow-gradient text-black font-black rounded-2xl text-lg uppercase shadow-xl hover:scale-[1.01] transition active:scale-95">
                    Taksi chaqirish
                </button>
            </div>

            <div id="driverCard" class="hidden glass p-6 rounded-[2rem] border-t-4 border-yellow-500 animate-bounce-short">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-yellow-500 rounded-full flex items-center justify-center text-3xl">👨🏻‍✈️</div>
                    <div class="flex-1">
                        <h4 id="carModel" class="text-xl font-black">Oq Chevrolet Gentra</h4>
                        <p id="carNumber" class="text-yellow-500 font-mono font-bold text-lg tracking-widest">01 | A 777 AA</p>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-gray-700 flex justify-between items-center text-sm">
                    <span class="text-gray-400">Haydovchi: <b class="text-white">Jasurbek</b></span>
                    <span class="bg-green-500 text-white px-3 py-1 rounded-full text-xs font-bold animate-pulse">Yo'lda...</span>
                </div>
            </div>
        </div>

        <div class="relative">
            <div id="map" class="border-4 border-slate-800 shadow-2xl"></div>
        </div>

    </div>

    <script>
        var map = L.map('map').setView([41.3111, 69.2797], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([41.3111, 69.2797], {draggable: true}).addTo(map);

        let selectedTarifName = "Ekonom";

        function selectTarif(el, name, price) {
            document.querySelectorAll('.tarif-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedTarifName = name;
        }

        function startOrder() {
            const from = document.getElementById('from').value;
            const to = document.getElementById('to').value;
            const btn = document.getElementById('mainBtn');
            const driverCard = document.getElementById('driverCard');

            if(!from || !to) { alert("Manzillarni to'ldiring!"); return; }

            btn.innerText = "Qidirilmoqda...";
            btn.disabled = true;

            // Mashina va raqamlarni generatsiya qilish
            const cars = {
                'Ekonom': ["Oq Chevrolet Nexia 3", "Kulrang Spark", "Oq Cobalt"],
                'Komfort': ["Qora Chevrolet Gentra", "To'q ko'k Tracker", "Kumushrang Onix"],
                'Biznes': ["Qora Malibu 2", "Oq BYD Song Plus", "Qora Kia K5"]
            };
            
            const randomCar = cars[selectedTarifName][Math.floor(Math.random() * 3)];
            const randomNum = Math.floor(100 + Math.random() * 899);
            const letters = "ABCDEFGHJKLMNOPQRSTUVWXYZ";
            const randomLet = letters[Math.floor(Math.random()*25)] + letters[Math.floor(Math.random()*25)];

            setTimeout(() => {
                btn.innerText = "BUYURTMA QABUL QILINDI";
                btn.classList.replace('yellow-gradient', 'bg-slate-700');
                btn.classList.add('text-white');
                
                document.getElementById('carModel').innerText = randomCar;
                document.getElementById('carNumber').innerText = `01 | ${randomNum} ${randomLet}`;
                
                driverCard.classList.remove('hidden');
                
                // Xaritaga haydovchi belgisini qo'shish (simulyatsiya)
                L.circle(marker.getLatLng(), {radius: 200, color: '#facc15'}).addTo(map);
            }, 2000);
        }

        // Avto GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                map.setView([lat, lng], 15);
                marker.setLatLng([lat, lng]);
                document.getElementById('from').value = "Mening joylashuvim";
            });
        }
    </script>
</body>
</html>
